name: SHAI-DLC Check

# Single, self-contained gate. On every PR, verify the change was developed through
# SHAI-DLC. If yes -> request review from Kamal (KK) for the rest of the process.
# If no -> fail the check (rejected). Uses only the built-in github-actions token —
# no external bot, no App, no central hub.

on:
  # pull_request_target so fork PRs get a write-capable token (to request a reviewer
  # + comment). We do NOT check out the PR's code — only read metadata via the API —
  # so running in the base context is safe.
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  shai-dlc:
    name: SHAI-DLC used?
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify SHAI-DLC and route to KK
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REVIEWER: SHAI-kamal-jain   # Kamal Kant Jain
        run: |
          set -euo pipefail

          # Did THIS change go through SHAI-DLC (shai-forge)?  The pipeline writes
          # committed artifacts; if the PR touches any of them, SHAI-DLC was used:
          #   .shai-output/<feature>/NN-*.md      (current — stage artifacts)
          #   .shai-log/<date>/<dev>/<feature>/   (current — curated audit; date starts YYYY)
          #   .shai-dlc/observations|plans/       (legacy convention)
          # (.shai-log/_raw and .shai/ are gitignored, so they never appear here.)
          if gh api "repos/$REPO/pulls/$PR/files" --paginate --jq '.[].filename' \
               | grep -qE '^\.shai-(output/|log/[0-9]|dlc/(observations|plans)/)'; then change=yes; else change=no; fi

          echo "SHAI-DLC used (pipeline artifacts in PR) = $change"

          if [ "$change" = yes ]; then
            gh pr edit  "$PR" --repo "$REPO" --add-reviewer "$REVIEWER" || true
            gh pr comment "$PR" --repo "$REPO" --body \
              "✅ **SHAI-DLC verified** — this change was developed through SHAI-DLC. Routing to @$REVIEWER for review and merge." || true
            echo "PASS — routed to @$REVIEWER"
          else
            gh pr comment "$PR" --repo "$REPO" --body \
              "❌ **SHAI-DLC not detected.** This change must be developed through SHAI-DLC — it should add or update an entry under \`.shai-dlc/observations/\` or \`.shai-dlc/plans/\`. Please redo it through SHAI-DLC and re-push." || true
            echo "::error::SHAI-DLC was not used for this PR — rejected."
            exit 1
          fi
